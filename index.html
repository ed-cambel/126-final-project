<!DOCTYPE html>
<html lang="en">
<head>
    <title> Leaflet Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        #map {
            width: 600px;
            height: 600px;
        }
    </style>

</head>
<body>

    <div id="map"></div>

</body>

<script>
    const map = L.map('map');
    map.setView([10.640991, 122.235399], 14);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png?{foo}', {foo: 'bar', 
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'}).addTo(map);

    // TLRC Marker
    L.marker([10.640338, 122.228372], {
        title: "TLRC Student Space", 
    }).bindPopup('<span> <b> TLRC Student Space</b><br>Opens: 8:00AM<br>Closes: 5:00PM<br></span>')
    .addTo(map);

    // Chancy Park Marker
    L.marker([10.641357, 122.231277], {
        title: "Chancellor's Park", 
    }).bindPopup('<span> <b> Chancellors Park</b><br>Good for Nature Lovers!<br>Open 24/7<br></span>')
    .addTo(map);
</script>

</html>
